# Cloud Build pipeline for the GClaw Next.js web client.
#
# Deploys as a separate Cloud Run service (gclaw-web) alongside the
# FastAPI backend (gclaw). The backend URL is baked into the JS
# bundle at build time via --build-arg.
#
# Invoke:
#   gcloud builds submit \
#     --project <your-project> \
#     --config web/cloudbuild.yaml \
#     --substitutions \
#       _PROJECT_ID=<your-project>,\
# _IMAGE=us-central1-docker.pkg.dev/<your-project>/gclaw/gclaw-web,\
# _API_URL=<your-backend-cloud-run-url> \
#     web/

substitutions:
  _PROJECT_ID: ""
  _REGION: us-central1
  _IMAGE: ""
  _SERVICE: gclaw-web
  # Cloud Run URL of the backend (gclaw) service in this project.
  # Baked into the JS bundle at build time as NEXT_PUBLIC_API_BASE_URL.
  _API_URL: ""

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_IMAGE}:${BUILD_ID}
      - --tag=${_IMAGE}:latest
      - --build-arg=NEXT_PUBLIC_API_BASE_URL=${_API_URL}
      - --build-arg=NEXT_PUBLIC_DEV_BYPASS_AUTH=true
      - --build-arg=NEXT_PUBLIC_GCP_PROJECT_ID=${_PROJECT_ID}
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, "--all-tags", "${_IMAGE}"]
    waitFor: [build]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --quiet
    waitFor: [push]

images:
  - ${_IMAGE}:${BUILD_ID}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 600s
