# CI/CD pipeline: test → deploy backend → deploy web on merge to master.
#
# Authentication uses Workload Identity Federation (WIF) — no long-lived
# service account keys. One-time setup required (see bottom of this file).
#
# Secrets required in GitHub repo settings:
#   GCP_PROJECT_ID         — <your-gcp-project>
#   GCP_REGION             — us-central1
#   WIF_PROVIDER           — projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   WIF_SERVICE_ACCOUNT    — gclaw-deployer@<your-gcp-project>.iam.gserviceaccount.com

name: Deploy

on:
  push:
    branches: [master]
  # PR trigger runs the `test` job pre-merge so auto-merge has a gating
  # status check. Deploy jobs are skipped on PR events (see `if:` guards).
  pull_request:
    branches: [master]

concurrency:
  # Distinct concurrency groups for PR checks vs. master deploys — a PR test
  # should never cancel an in-flight master deploy and vice-versa.
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}

jobs:
  # ── Path filter ────────────────────────────────────────────────────
  # Emits per-path booleans so the Phoenix deploy only runs when
  # infra/phoenix/** or this workflow actually changed.
  changes:
    name: Detect changed paths
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      phoenix: ${{ steps.filter.outputs.phoenix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            phoenix:
              - 'infra/phoenix/**'
              - '.github/workflows/deploy.yml'

  # ── Test ───────────────────────────────────────────────────────────
  test:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        env:
          GCP_PROJECT_ID: test-project
        run: uv run pytest tests/ -q --ignore=tests/test_integration_litellm_providers.py

  # ── Deploy backend (FastAPI → Cloud Run: gclaw) ────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for WIF

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy backend
        # PR #9 stripped personal defaults from cloudbuild.yaml; all
        # deployment-specific values now come via substitutions. Sourced
        # from GitHub secrets so they stay out of git history.
        env:
          MEMORY_ENGINE_ID: ${{ secrets.MEMORY_ENGINE_ID }}
          GWS_USER: ${{ secrets.GWS_USER }}
          VPC_CONNECTOR: ${{ secrets.VPC_CONNECTOR }}
          POSTIZ_BASE_URL: ${{ secrets.POSTIZ_BASE_URL }}
          POSTIZ_REVIEWER_URL: ${{ secrets.POSTIZ_REVIEWER_URL }}
          POSTIZ_CHANNEL_PRIMARY: ${{ secrets.POSTIZ_CHANNEL_PRIMARY }}
          POSTIZ_CHANNEL_SECONDARY: ${{ secrets.POSTIZ_CHANNEL_SECONDARY }}
          SECRET_NAME_PREFIX: ${{ secrets.SECRET_NAME_PREFIX }}
        run: |
          SUBS="_PROJECT_ID=${GCP_PROJECT}"
          SUBS+=",_REGION=${GCP_REGION}"
          SUBS+=",_IMAGE=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/gclaw/gclaw"
          SUBS+=",_SERVICE_ACCOUNT=gclaw-run-sa@${GCP_PROJECT}.iam.gserviceaccount.com"
          [[ -n "$MEMORY_ENGINE_ID" ]] && SUBS+=",_MEMORY_ENGINE_ID=${MEMORY_ENGINE_ID}"
          [[ -n "$GWS_USER" ]] && SUBS+=",_GWS_USER=${GWS_USER}"
          [[ -n "$VPC_CONNECTOR" ]] && SUBS+=",_VPC_CONNECTOR=${VPC_CONNECTOR}"
          [[ -n "$POSTIZ_BASE_URL" ]] && SUBS+=",_POSTIZ_BASE_URL=${POSTIZ_BASE_URL}"
          [[ -n "$POSTIZ_REVIEWER_URL" ]] && SUBS+=",_POSTIZ_REVIEWER_URL=${POSTIZ_REVIEWER_URL}"
          [[ -n "$POSTIZ_CHANNEL_PRIMARY" ]] && SUBS+=",_POSTIZ_CHANNEL_PRIMARY=${POSTIZ_CHANNEL_PRIMARY}"
          [[ -n "$POSTIZ_CHANNEL_SECONDARY" ]] && SUBS+=",_POSTIZ_CHANNEL_SECONDARY=${POSTIZ_CHANNEL_SECONDARY}"
          [[ -n "$SECRET_NAME_PREFIX" ]] && SUBS+=",_SECRET_NAME_PREFIX=${SECRET_NAME_PREFIX}"
          gcloud builds submit \
            --project "$GCP_PROJECT" \
            --config cloudbuild.yaml \
            --substitutions "$SUBS" \
            --quiet

  # ── Deploy web (Next.js → Cloud Run: gclaw-web) ───────────────────
  deploy-web:
    name: Deploy Web
    needs: deploy-backend  # backend must be live before web builds (API URL baked in)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy web
        working-directory: web
        # _API_URL is the backend Cloud Run URL — resolved dynamically
        # post-backend-deploy so we bake the live URL into the JS bundle.
        run: |
          API_URL=$(gcloud run services describe gclaw \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.url)')
          SUBS="_PROJECT_ID=${GCP_PROJECT}"
          SUBS+=",_REGION=${GCP_REGION}"
          SUBS+=",_IMAGE=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/gclaw/gclaw-web"
          SUBS+=",_API_URL=${API_URL}"
          gcloud builds submit \
            --project "$GCP_PROJECT" \
            --config cloudbuild.yaml \
            --substitutions "$SUBS" \
            --quiet .

  # ── Deploy Phoenix (observability OTLP sink → Cloud Run: phoenix) ──
  # Path-filtered: only runs when infra/phoenix/** or this workflow
  # changes. See infra/phoenix/README.md for one-time GCP provisioning.
  deploy-phoenix:
    name: Deploy Phoenix
    needs: [test, changes]
    if: github.event_name == 'push' && needs.changes.outputs.phoenix == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy phoenix
        env:
          VPC_CONNECTOR: ${{ secrets.VPC_CONNECTOR }}
        run: |
          SUBS="_PROJECT_ID=${GCP_PROJECT}"
          SUBS+=",_REGION=${GCP_REGION}"
          SUBS+=",_IMAGE=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/gclaw/phoenix"
          SUBS+=",_SERVICE_ACCOUNT=phoenix-run-sa@${GCP_PROJECT}.iam.gserviceaccount.com"
          [[ -n "$VPC_CONNECTOR" ]] && SUBS+=",_VPC_CONNECTOR=${VPC_CONNECTOR}"
          gcloud builds submit \
            --project "$GCP_PROJECT" \
            --config infra/phoenix/cloudbuild.yaml \
            --substitutions "$SUBS" \
            --quiet

# ─────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (run these gcloud commands once to enable WIF)
# ─────────────────────────────────────────────────────────────────────
#
# 1. Create a deployer service account:
#
#    gcloud iam service-accounts create gclaw-deployer \
#      --display-name="GClaw GitHub Actions deployer" \
#      --project=<your-gcp-project>
#
# 2. Grant it the roles Cloud Build needs to trigger builds:
#
#    SA=gclaw-deployer@<your-gcp-project>.iam.gserviceaccount.com
#    for role in roles/cloudbuild.builds.editor roles/serviceusage.serviceUsageConsumer roles/iam.serviceAccountUser roles/storage.objectAdmin; do
#      gcloud projects add-iam-policy-binding <your-gcp-project> \
#        --member="serviceAccount:${SA}" --role="${role}" --quiet
#    done
#
# 3. Create the Workload Identity Pool + Provider:
#
#    gcloud iam workload-identity-pools create github-pool \
#      --location=global \
#      --display-name="GitHub Actions" \
#      --project=<your-gcp-project>
#
#    gcloud iam workload-identity-pools providers create-oidc github-provider \
#      --location=global \
#      --workload-identity-pool=github-pool \
#      --issuer-uri="https://token.actions.githubusercontent.com" \
#      --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#      --attribute-condition="assertion.repository=='<owner>/<repo>'" \
#      --project=<your-gcp-project>
#
# 4. Allow the GitHub repo to impersonate the deployer SA:
#
#    POOL_ID=$(gcloud iam workload-identity-pools describe github-pool \
#      --location=global --project=<your-gcp-project> --format='value(name)')
#
#    gcloud iam service-accounts add-iam-policy-binding \
#      gclaw-deployer@<your-gcp-project>.iam.gserviceaccount.com \
#      --role=roles/iam.workloadIdentityUser \
#      --member="principalSet://iam.googleapis.com/${POOL_ID}/attribute.repository/<owner>/<repo>" \
#      --project=<your-gcp-project>
#
# 5. Get the full provider resource name for the GitHub secret:
#
#    gcloud iam workload-identity-pools providers describe github-provider \
#      --location=global \
#      --workload-identity-pool=github-pool \
#      --project=<your-gcp-project> \
#      --format='value(name)'
#
#    → Set this as the WIF_PROVIDER secret in GitHub repo settings.
#
# 6. Set GitHub repo secrets (Settings → Secrets → Actions):
#
#    GCP_PROJECT_ID       = <your-gcp-project>
#    GCP_REGION           = us-central1
#    WIF_PROVIDER         = (output from step 5)
#    WIF_SERVICE_ACCOUNT  = gclaw-deployer@<your-gcp-project>.iam.gserviceaccount.com
