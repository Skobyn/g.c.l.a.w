# CI/CD pipeline: test → deploy backend → deploy web on merge to master.
#
# Authentication uses Workload Identity Federation (WIF) — no long-lived
# service account keys. One-time setup required (see bottom of this file).
#
# Secrets required in GitHub repo settings:
#   GCP_PROJECT_ID         — apex-internal-apps
#   GCP_REGION             — us-central1
#   WIF_PROVIDER           — projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#   WIF_SERVICE_ACCOUNT    — gclaw-deployer@apex-internal-apps.iam.gserviceaccount.com

name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}

jobs:
  # ── Path filter ────────────────────────────────────────────────────
  # Emits per-path booleans so the Phoenix deploy only runs when
  # infra/phoenix/** or this workflow actually changed.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      phoenix: ${{ steps.filter.outputs.phoenix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            phoenix:
              - 'infra/phoenix/**'
              - '.github/workflows/deploy.yml'

  # ── Test ───────────────────────────────────────────────────────────
  test:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        env:
          GCP_PROJECT_ID: test-project
        run: uv run pytest tests/ -q --ignore=tests/test_integration_litellm_providers.py

  # ── Deploy backend (FastAPI → Cloud Run: gclaw) ────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for WIF

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy backend
        run: gcloud builds submit --project $GCP_PROJECT --config cloudbuild.yaml --quiet

  # ── Deploy web (Next.js → Cloud Run: gclaw-web) ───────────────────
  deploy-web:
    name: Deploy Web
    needs: deploy-backend  # backend must be live before web builds (API URL baked in)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy web
        working-directory: web
        run: gcloud builds submit --project $GCP_PROJECT --config cloudbuild.yaml . --quiet

  # ── Deploy Phoenix (observability OTLP sink → Cloud Run: phoenix) ──
  # Path-filtered: only runs when infra/phoenix/** or this workflow
  # changes. See infra/phoenix/README.md for one-time GCP provisioning.
  deploy-phoenix:
    name: Deploy Phoenix
    needs: [test, changes]
    if: needs.changes.outputs.phoenix == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & deploy phoenix
        run: gcloud builds submit --project $GCP_PROJECT --config infra/phoenix/cloudbuild.yaml --quiet

# ─────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (run these gcloud commands once to enable WIF)
# ─────────────────────────────────────────────────────────────────────
#
# 1. Create a deployer service account:
#
#    gcloud iam service-accounts create gclaw-deployer \
#      --display-name="GClaw GitHub Actions deployer" \
#      --project=apex-internal-apps
#
# 2. Grant it the roles Cloud Build needs to trigger builds:
#
#    SA=gclaw-deployer@apex-internal-apps.iam.gserviceaccount.com
#    for role in roles/cloudbuild.builds.editor roles/serviceusage.serviceUsageConsumer roles/iam.serviceAccountUser roles/storage.objectAdmin; do
#      gcloud projects add-iam-policy-binding apex-internal-apps \
#        --member="serviceAccount:${SA}" --role="${role}" --quiet
#    done
#
# 3. Create the Workload Identity Pool + Provider:
#
#    gcloud iam workload-identity-pools create github-pool \
#      --location=global \
#      --display-name="GitHub Actions" \
#      --project=apex-internal-apps
#
#    gcloud iam workload-identity-pools providers create-oidc github-provider \
#      --location=global \
#      --workload-identity-pool=github-pool \
#      --issuer-uri="https://token.actions.githubusercontent.com" \
#      --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#      --attribute-condition="assertion.repository=='Skobyn/gclaw'" \
#      --project=apex-internal-apps
#
# 4. Allow the GitHub repo to impersonate the deployer SA:
#
#    POOL_ID=$(gcloud iam workload-identity-pools describe github-pool \
#      --location=global --project=apex-internal-apps --format='value(name)')
#
#    gcloud iam service-accounts add-iam-policy-binding \
#      gclaw-deployer@apex-internal-apps.iam.gserviceaccount.com \
#      --role=roles/iam.workloadIdentityUser \
#      --member="principalSet://iam.googleapis.com/${POOL_ID}/attribute.repository/Skobyn/gclaw" \
#      --project=apex-internal-apps
#
# 5. Get the full provider resource name for the GitHub secret:
#
#    gcloud iam workload-identity-pools providers describe github-provider \
#      --location=global \
#      --workload-identity-pool=github-pool \
#      --project=apex-internal-apps \
#      --format='value(name)'
#
#    → Set this as the WIF_PROVIDER secret in GitHub repo settings.
#
# 6. Set GitHub repo secrets (Settings → Secrets → Actions):
#
#    GCP_PROJECT_ID       = apex-internal-apps
#    GCP_REGION           = us-central1
#    WIF_PROVIDER         = (output from step 5)
#    WIF_SERVICE_ACCOUNT  = gclaw-deployer@apex-internal-apps.iam.gserviceaccount.com
