# Auto-fix CI failures using Claude Code.
#
# When the Deploy workflow fails, this workflow:
# 1. Downloads the failure logs
# 2. Runs Claude Code CLI with the logs as context
# 3. Claude diagnoses the issue and pushes a fix to a branch
# 4. Opens a PR targeting master
#
# Requires:
#   ANTHROPIC_API_KEY — set in GitHub repo secrets

name: Auto-fix CI

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

jobs:
  auto-fix:
    name: Diagnose & fix
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Download failure logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          echo "Fetching logs for run ${RUN_ID}..."
          gh run view "${RUN_ID}" --log-failed > /tmp/ci-failure.log 2>&1 || true
          echo "--- Log tail ---"
          tail -100 /tmp/ci-failure.log

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code to fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BRANCH="auto-fix/ci-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "${BRANCH}"

          FAILURE_LOG=$(cat /tmp/ci-failure.log | tail -200)

          claude -p "The CI pipeline for this project just failed. Here are the failure logs:

          \`\`\`
          ${FAILURE_LOG}
          \`\`\`

          Diagnose the root cause and fix it. The fix should be minimal — only change what's needed to make CI pass. Do NOT add features or refactor unrelated code.

          Key context:
          - Python backend in src/gclaw/, tests in tests/
          - Next.js frontend in web/
          - CI runs: pytest tests/ -q --ignore=tests/test_integration_litellm_providers.py
          - Read CLAUDE.md for project structure

          After fixing, verify by running: GCP_PROJECT_ID=test-project uv run pytest tests/ -q --ignore=tests/test_integration_litellm_providers.py

          Only commit if tests pass." --allowedTools "Edit,Write,Read,Bash,Glob,Grep"

          # Check if Claude made any commits
          if git diff --quiet HEAD origin/${{ github.event.workflow_run.head_branch }}; then
            echo "No changes made — Claude couldn't find a fix."
            exit 0
          fi

          git push origin "${BRANCH}"

          gh pr create \
            --title "fix(ci): auto-fix for failed deploy run #${{ github.event.workflow_run.run_number }}" \
            --body "$(cat <<'PREOF'
          ## Auto-fix PR

          The [Deploy workflow run #${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }}) failed. Claude Code diagnosed the failure and produced this fix.

          **Review carefully before merging** — this was generated automatically.

          🤖 Generated by Claude Code via `.github/workflows/auto-fix.yml`
          PREOF
          )" \
            --base master \
            --head "${BRANCH}"
