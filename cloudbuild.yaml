# Cloud Build pipeline for GClaw.
#
# All deployment-specific values are in the `substitutions:` block below.
# Most defaults are placeholders — you MUST override the substitutions
# (or use `scripts/deploy.sh` which builds them from env vars) for any
# real deployment.
#
# Invoke (typical):
#   ./scripts/deploy.sh <your-project> us-central1
#
# Invoke (raw gcloud):
#   gcloud builds submit \
#     --project <your-project> \
#     --config cloudbuild.yaml \
#     --substitutions \
#       _PROJECT_ID=<your-project>,\
# _IMAGE=us-central1-docker.pkg.dev/<your-project>/gclaw/gclaw,\
# _SERVICE_ACCOUNT=gclaw-run-sa@<your-project>.iam.gserviceaccount.com,\
# _MEMORY_ENGINE_ID=<your-reasoning-engine-id>,\
# _GWS_USER=<your-workspace-user>,\
# _VPC_CONNECTOR=<your-connector-or-empty>
#
# Or hook to a Cloud Build trigger on push to main/feat/* branches in
# the Cloud Console or via `gcloud builds triggers create`.

substitutions:
  _PROJECT_ID: ""
  _REGION: us-central1
  _IMAGE: ""
  _SERVICE: gclaw
  # Dedicated runtime service account with least-privilege roles:
  # aiplatform.user (Gemini via Vertex AI + Memory Bank), datastore.user
  # (Firestore), logging.logWriter, monitoring.metricWriter,
  # secretmanager.secretAccessor, storage.objectAdmin. Created by
  # scripts/bootstrap-gcp.sh.
  _SERVICE_ACCOUNT: ""
  # Vertex AI Memory Bank reasoning engine ID. Numeric or full resource
  # path; settings.py parses both forms. Leave empty when MEMORY_ENABLED
  # is "false" (skip the bootstrap).
  _MEMORY_ENGINE_ID: ""
  # Google Workspace user that the gws CLI impersonates for Workspace
  # tool calls (Gmail, Calendar, Drive). Domain-wide delegation must be
  # configured for the runtime SA against this user. Leave empty if not
  # using Workspace tools.
  _GWS_USER: ""
  # Serverless VPC connector — needed only when reaching internal-only
  # Cloud Run services (e.g. Phoenix's internal-ingress). Leave empty
  # for a public-only setup AND drop the --vpc-* flags below by
  # commenting them out.
  _VPC_CONNECTOR: ""
  # Postiz integration (social-media scheduling). Empty values disable
  # the Postiz tools at startup. The tools also require POSTIZ_API_TOKEN
  # to be present (typically bootstrapped from Secret Manager).
  _POSTIZ_BASE_URL: ""
  _POSTIZ_REVIEWER_URL: ""
  _POSTIZ_CHANNEL_PRIMARY: ""
  _POSTIZ_CHANNEL_SECONDARY: ""
  # Secret Manager name prefix for bootstrapped credentials. Default
  # "gclaw-" matches the canonical naming. Override (e.g. to "watson-")
  # if your live SM resources use a legacy prefix and you don't want to
  # migrate them. See docs/SECRETS_MIGRATION.md.
  _SECRET_NAME_PREFIX: "gclaw-"

steps:
  # 1. Build the image with both commit SHA and latest tags.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_IMAGE}:${BUILD_ID}
      - --tag=${_IMAGE}:latest
      - .

  # 2. Push both tags to Artifact Registry.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:${BUILD_ID}"]
    waitFor: [build]

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:latest"]
    waitFor: [build]

  # 3. Deploy to Cloud Run. Creates the service on first run, updates in
  #    place on subsequent runs. Minimum env vars to start the container;
  #    users should override via `gcloud run services update ...` for real
  #    Firestore/Memory Bank/auth config.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=${_SERVICE_ACCOUNT}
      # VPC connector + all-traffic egress so the backend's OTLP exporter
      # can reach Phoenix's internal-ingress Cloud Run URL. Without
      # egress=all-traffic, *.run.app DNS resolves to public IPs and
      # Phoenix's `internal-and-cloud-load-balancing` ingress 404s the
      # request before the container sees it. Comment both out for
      # public-only setups.
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=all-traffic
      # GOOGLE_GENAI_USE_VERTEXAI + GOOGLE_CLOUD_PROJECT + GOOGLE_CLOUD_LOCATION
      # route ADK's google.genai client through Vertex AI (auth via ADC from
      # the Cloud Run service account) rather than the public Gemini API path
      # (which requires GOOGLE_API_KEY). Without these, every /chat request
      # fails at the first LLM call with "No API key was provided".
      - --set-env-vars=GCP_PROJECT_ID=${_PROJECT_ID},GCP_LOCATION=${_REGION},FIRESTORE_DATABASE=(default),GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=${_PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},MODEL_ROUTING_ENABLED=false,MEMORY_ENABLED=true,MEMORY_BANK_REASONING_ENGINE_ID=${_MEMORY_ENGINE_ID},FIREBASE_AUTH_ENABLED=false,GWS_IMPERSONATE_USER=${_GWS_USER},OBSERVABILITY_ENABLED=true,OTEL_SERVICE_NAME=gclaw-backend,OTEL_SAMPLING_RATIO=1.0,GUARDRAILS_ENABLED=true,GUARDRAILS_DEFAULT_PROFILE=loose,VERTEX_SCORING_ENABLED=true,POSTIZ_BASE_URL=${_POSTIZ_BASE_URL},POSTIZ_REVIEWER_URL=${_POSTIZ_REVIEWER_URL},POSTIZ_CHANNEL_PRIMARY=${_POSTIZ_CHANNEL_PRIMARY},POSTIZ_CHANNEL_SECONDARY=${_POSTIZ_CHANNEL_SECONDARY},SECRET_NAME_PREFIX=${_SECRET_NAME_PREFIX}
      # OTEL_EXPORTER_OTLP_ENDPOINT is Secret-Manager-backed: the
      # initial placeholder value is swapped in post-Phoenix-deploy to
      # the real `<phoenix URL>/v1/traces`. Fail-soft OTLP exporter
      # means the backend boots clean even while the placeholder is live.
      - --set-secrets=OTEL_EXPORTER_OTLP_ENDPOINT=otel-exporter-otlp-endpoint:latest
      - --quiet
    waitFor: [push-sha]

images:
  - ${_IMAGE}:${BUILD_ID}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  substitution_option: ALLOW_LOOSE

timeout: 1200s
