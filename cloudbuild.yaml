# Cloud Build pipeline for GClaw.
#
# All deployment-specific values are in the `substitutions:` block below.
# The defaults reflect the upstream `apex-internal-apps` deployment so
# `gcloud builds submit --config cloudbuild.yaml` keeps working unchanged
# from a clone of that environment. Forks should override the relevant
# substitutions instead of editing this file in-tree.
#
# Invoke manually (upstream defaults):
#   gcloud builds submit --project apex-internal-apps --config cloudbuild.yaml
#
# Invoke against your own project:
#   gcloud builds submit \
#     --project <your-project> \
#     --config cloudbuild.yaml \
#     --substitutions \
#       _PROJECT_ID=<your-project>,\
# _IMAGE=us-central1-docker.pkg.dev/<your-project>/gclaw/gclaw,\
# _SERVICE_ACCOUNT=gclaw-run-sa@<your-project>.iam.gserviceaccount.com,\
# _MEMORY_ENGINE_ID=<your-reasoning-engine-id>,\
# _GWS_USER=<your-workspace-user>,\
# _VPC_CONNECTOR=<your-connector-or-empty>
#
# Or hook to a Cloud Build trigger on push to main/feat/* branches in
# the Cloud Console or via `gcloud builds triggers create`.

substitutions:
  _PROJECT_ID: apex-internal-apps
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/apex-internal-apps/gclaw/gclaw
  _SERVICE: gclaw
  # Dedicated runtime service account with least-privilege roles:
  # aiplatform.user (Gemini via Vertex AI + Memory Bank), datastore.user
  # (Firestore), logging.logWriter, monitoring.metricWriter. Replaces
  # the default compute SA so other Cloud Run services in this project
  # aren't broadened when we grant GClaw new permissions.
  _SERVICE_ACCOUNT: gclaw-run-sa@apex-internal-apps.iam.gserviceaccount.com
  # Vertex AI Memory Bank reasoning engine ID. Each deployment gets its
  # own engine (numeric or full resource path); see settings.py for how
  # the runtime parses both forms.
  _MEMORY_ENGINE_ID: "1568060811371347968"
  # Google Workspace user that the gws CLI impersonates for Workspace
  # tool calls (Gmail, Calendar, Drive). Domain-wide delegation must be
  # configured for the runtime SA against this user.
  _GWS_USER: sbenson@getapexinsights.com
  # Serverless VPC connector — needed only when reaching internal-only
  # Cloud Run services (e.g. Phoenix's internal-ingress). Override to
  # empty string + drop the --vpc-* flags below for a public-only setup.
  _VPC_CONNECTOR: n8n-vpc
  # Postiz integration (social-media scheduling). Empty values disable
  # the Postiz tools at startup. The tools also require POSTIZ_API_TOKEN
  # to be present (typically bootstrapped from Secret Manager).
  _POSTIZ_BASE_URL: https://postiz.digitalbrainworks.com
  _POSTIZ_REVIEWER_URL: https://postiz-reviewer-qkaevtm7wq-uc.a.run.app
  _POSTIZ_CHANNEL_SCOTT: cmmh4zsgw0001pn7hcajjulhj
  _POSTIZ_CHANNEL_APEX: ""

steps:
  # 1. Build the image with both commit SHA and latest tags.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_IMAGE}:${BUILD_ID}
      - --tag=${_IMAGE}:latest
      - .

  # 2. Push both tags to Artifact Registry.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:${BUILD_ID}"]
    waitFor: [build]

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:latest"]
    waitFor: [build]

  # 3. Deploy to Cloud Run. Creates the service on first run, updates in
  #    place on subsequent runs. Minimum env vars to start the container;
  #    users should override via `gcloud run services update ...` for real
  #    Firestore/Memory Bank/auth config.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=${_SERVICE_ACCOUNT}
      # VPC connector + all-traffic egress so the backend's OTLP exporter
      # can reach Phoenix's internal-ingress Cloud Run URL. Without
      # egress=all-traffic, *.run.app DNS resolves to public IPs and
      # Phoenix's `internal-and-cloud-load-balancing` ingress 404s the
      # request before the container sees it.
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=all-traffic
      # GOOGLE_GENAI_USE_VERTEXAI + GOOGLE_CLOUD_PROJECT + GOOGLE_CLOUD_LOCATION
      # route ADK's google.genai client through Vertex AI (auth via ADC from
      # the Cloud Run service account) rather than the public Gemini API path
      # (which requires GOOGLE_API_KEY). Without these, every /chat request
      # fails at the first LLM call with "No API key was provided".
      - --set-env-vars=GCP_PROJECT_ID=${_PROJECT_ID},GCP_LOCATION=${_REGION},FIRESTORE_DATABASE=(default),GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=${_PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},MODEL_ROUTING_ENABLED=false,MEMORY_ENABLED=true,MEMORY_BANK_REASONING_ENGINE_ID=${_MEMORY_ENGINE_ID},FIREBASE_AUTH_ENABLED=false,GWS_IMPERSONATE_USER=${_GWS_USER},OBSERVABILITY_ENABLED=true,OTEL_SERVICE_NAME=gclaw-backend,OTEL_SAMPLING_RATIO=1.0,GUARDRAILS_ENABLED=true,GUARDRAILS_DEFAULT_PROFILE=loose,VERTEX_SCORING_ENABLED=true,POSTIZ_BASE_URL=${_POSTIZ_BASE_URL},POSTIZ_REVIEWER_URL=${_POSTIZ_REVIEWER_URL},POSTIZ_CHANNEL_SCOTT=${_POSTIZ_CHANNEL_SCOTT},POSTIZ_CHANNEL_APEX=${_POSTIZ_CHANNEL_APEX}
      # OTEL_EXPORTER_OTLP_ENDPOINT is Secret-Manager-backed: the
      # initial placeholder value is swapped in post-Phoenix-deploy to
      # the real `<phoenix URL>/v1/traces`. Fail-soft OTLP exporter
      # means the backend boots clean even while the placeholder is live.
      - --set-secrets=OTEL_EXPORTER_OTLP_ENDPOINT=otel-exporter-otlp-endpoint:latest
      - --quiet
    waitFor: [push-sha]

images:
  - ${_IMAGE}:${BUILD_ID}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  substitution_option: ALLOW_LOOSE

timeout: 1200s
