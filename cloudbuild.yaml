# Cloud Build pipeline for GClaw.
#
# Deploys to apex-internal-apps (the internal-apps GCP project).
# Firestore, Firebase Auth, and GCS stay in saltwater-sync — this
# pipeline only touches compute (Artifact Registry + Cloud Run) in
# apex-internal-apps.
#
# Invoke manually:
#   gcloud builds submit --project apex-internal-apps --config cloudbuild.yaml
#
# Or hook to a Cloud Build trigger on push to main/feat/* branches in
# the Cloud Console or via `gcloud builds triggers create`.

substitutions:
  _REGION: us-central1
  _REPO: gclaw
  _SERVICE: gclaw
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

steps:
  # 1. Build the image with both commit SHA and latest tags.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_IMAGE}:${SHORT_SHA}
      - --tag=${_IMAGE}:latest
      - .

  # 2. Push both tags to Artifact Registry.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:${SHORT_SHA}"]
    waitFor: [build]

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:latest"]
    waitFor: [build]

  # 3. Deploy to Cloud Run. Service must exist ahead of time (one-time
  #    `gcloud run deploy gclaw --image=... --region=us-central1`).
  #    Subsequent deploys only update the image.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet
    waitFor: [push-sha]

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
