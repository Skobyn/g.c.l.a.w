name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        if: hashFiles('requirements.txt') != ''

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        if: hashFiles('package.json') != ''

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
        if: hashFiles('requirements.txt') != ''

      - name: Install Node dependencies
        run: npm ci
        if: hashFiles('package.json') != ''

      - name: Run Python tests
        run: pytest
        if: hashFiles('requirements.txt') != ''

      - name: Run Node tests
        run: npm test
        if: hashFiles('package.json') != ''

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        if: hashFiles('requirements.txt') != ''

      - name: Lint Python
        run: |
          pip install ruff
          ruff check .
        if: hashFiles('requirements.txt') != ''

      - name: Lint Node
        run: |
          npm ci
          npm run lint
        if: hashFiles('package.json') != ''
        continue-on-error: true
